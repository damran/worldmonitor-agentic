name: integration

# End-to-end tests against real backing services (Neo4j/Postgres/MinIO) spun up
# via testcontainers. This is the Phase-1 acceptance gate; it should be a
# required status check alongside `quality` and `security`.

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system build deps (ICU headers for PyICU)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libicu-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Pin Python
        run: uv python install 3.12

      - name: Sync (with dev group)
        run: uv sync --dev

      - name: Integration tests (testcontainers)
        run: uv run pytest -m integration
