name: security

# Supply-chain + static security scanning. The `security` job (Trivy) is the
# status check that branch protection requires alongside `quality`.
#
# CodeQL runs in the `codeql` job below: the repo is public since 2026-07-23,
# so GitHub code scanning is free and the SARIF upload works. `codeql` is NOT a
# branch-protection-required check (the required set stays quality/security/…);
# findings surface in the Security tab.

on:
  push:
    # Working-branch trigger so the gate runs without a PR (reviewer-gated merge to
    # master). Replace this branch entry at gate close.
    branches: [master, main, fix-flatten-name-projection]
  pull_request:
  schedule:
    # Weekly re-scan so newly disclosed CVEs surface even without a push.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem + config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          # Vendored third-party minified bundles (globe.gl/three.js, force-graph) are not our
          # source; scanning them for secrets/vuln/misconfig is pure false-positive noise (ADR 0115,
          # Slice D). They are self-hosted static assets, loaded but never executed server-side.
          skip-dirs: src/worldmonitor/api/static/app/vendor

  codeql:
    name: codeql (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        # python = the platform; javascript-typescript = the small dashboard JS
        # (vendored minified bundles under api/static/app/vendor are excluded via config).
        language: [python, javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config: |
            paths-ignore:
              - src/worldmonitor/api/static/app/vendor

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql/${{ matrix.language }}
