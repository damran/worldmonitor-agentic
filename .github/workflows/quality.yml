name: quality

# Lint, type-check, and test. This is the `quality` status check that
# branch protection requires before merge.

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Pin Python
        run: uv python install 3.12

      - name: Sync (with dev group)
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright (strict on src/)
        run: uv run pyright

      - name: Pytest + coverage
        run: uv run pytest
