# WorldMonitor — core development stack (Phase 0).
#
#   cp .env.example .env   # fill in values first
#   docker compose -f deploy/compose.yaml up -d
#
# Core services have no profile, so a bare `up` starts them (and
# `--profile core` is equivalent). Future optional services get named profiles.
#
# Images are pinned; bump deliberately. Verify newer tags before changing.

name: worldmonitor

services:
  # --- PostgreSQL 16 + pgvector (app metadata + Zitadel store) ---
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-worldmonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-worldmonitor}
      ZITADEL_DB: ${ZITADEL_DB:-zitadel}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-worldmonitor}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Neo4j 2026.x + Graph Data Science (system of record) ---
  neo4j:
    # Pinned tag (do NOT float): this exact neo4j:2026.05.0-community + GDS auto-download
    # pair is CI-proven — tests/integration/test_graph_gds.py runs green against it and
    # tests/conftest.py uses the same tag. The GDS jar is keyed to the EXACT server
    # version, so bumping the tag without re-validating GDS can break the boot.
    image: neo4j:2026.05.0-community
    restart: unless-stopped
    # Cap container memory so the JVM stays inside the cgroup. Keep this ABOVE
    # heap_max + pagecache + ~1g JVM/OS overhead (2g + 512m + ~1g = 3.5g < 4g default).
    mem_limit: ${NEO4J_MEM_LIMIT:-4g}
    environment:
      # The neo4j SERVER gets its initial password from NEO4J_AUTH ONLY. Do NOT also set a
      # bare NEO4J_PASSWORD: the image maps every NEO4J_<x> env var to a neo4j.conf setting,
      # so NEO4J_PASSWORD becomes an invalid 'password' key that Neo4j 2026 strict config
      # validation rejects -> the container crash-loops and never binds 7687. (The app
      # CLIENT still reads NEO4J_PASSWORD from .env; only the SERVICE must not inherit it.)
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*"
      NEO4J_dbms_security_procedures_allowlist: "gds.*"
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512m}
      # BOUND the JVM heap. Without this Neo4j auto-sizes max heap from visible RAM
      # (~25%); under WSL2 (which reports a large fraction of host RAM) that over-commits
      # and the kernel OOM-killer reaps the server before it binds 7687 — which presents
      # exactly as "connection refused on 7687". Laptop-safe defaults; bump via env on a
      # big host (see .env.example). NOTE the DOUBLED underscore: Neo4j escapes a literal
      # "_" in a setting name as "__" (server.memory.heap.max_size -> ..._heap_max__size).
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-1g}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-2g}
    ports:
      - "7474:7474" # HTTP / Browser
      - "7687:7687" # Bolt
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      # Password interpolated by compose at parse time (the server no longer carries a
      # NEO4J_PASSWORD env var); it matches the NEO4J_AUTH password above.
      test:
        ["CMD-SHELL", "cypher-shell -u neo4j -p \"${NEO4J_PASSWORD}\" 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 40s

  # --- MinIO (S3-compatible landing zone) ---
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-worldmonitor}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # --- Redis (cache / queues) ---
  redis:
    image: redis:7.4
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  # --- Zitadel (auth / tenancy, OIDC) ---
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.15.2
    restart: unless-stopped
    command: >
      start-from-init
      --masterkey ${ZITADEL_MASTERKEY:?set a 32-char ZITADEL_MASTERKEY in .env}
      --tlsMode disabled
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNALDOMAIN:-localhost}
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNALPORT:-8080}
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
      # Database connection (admin role runs migrations; user role serves runtime)
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${ZITADEL_DB:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${POSTGRES_USER:-worldmonitor}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${POSTGRES_USER:-worldmonitor}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # First instance: org (= first tenant) + admin human user
      ZITADEL_FIRSTINSTANCE_ORG_NAME: ${ZITADEL_ORG_NAME:-WorldMonitor}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_USERNAME:-admin}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:?set ZITADEL_ADMIN_PASSWORD in .env}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: ${ZITADEL_ADMIN_EMAIL:-admin@worldmonitor.localhost}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: "true"
      # Machine user + PAT for automated OIDC-app provisioning (see scripts/dev/zitadel_provision.sh)
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: ${ZITADEL_SA_USERNAME:-provisioner}
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: ${ZITADEL_SA_USERNAME:-provisioner}
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: /machinekey/pat.txt
    ports:
      - "8080:8080"
    volumes:
      - zitadel-machinekey:/machinekey
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready", "--config", "/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # --- One-shot schema migration (Gate B-4c; ADR 0030 production schema path) ---
  # The driver's startup recover_stale() queries task_run/connector_instance, so the app schema
  # must exist before api/driver boot. Runs `alembic upgrade head` (via migrate_to_head) once
  # after Postgres is healthy, then exits — the conventional deploy migration step.
  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
    image: worldmonitor-app:dev
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - python
      - -m
      - worldmonitor.db.migrate
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-worldmonitor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-worldmonitor}

  # --- One-shot landing-bucket bootstrap (Gate B-4c) ---
  # The API's /ready probe does a read-only head_bucket on the landing bucket; on a fresh stack
  # that bucket does not exist yet (it was previously created lazily by the first ingest), so
  # /ready would be 503 forever and `api` could never reach healthy. This runs our OWN image's
  # canonical ensure_bucket() once, after MinIO is healthy, then exits — no extra image to pin.
  minio-init:
    build:
      context: ..
      dockerfile: Dockerfile
    image: worldmonitor-app:dev
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    command:
      - python
      - -c
      - "from worldmonitor.storage.landing import LandingStore; LandingStore.from_settings().ensure_bucket()"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-worldmonitor}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_SECURE: "false"
      LANDING_BUCKET: ${LANDING_BUCKET:-landing}

  # --- WorldMonitor API (FastAPI; the only read surface onto the graph/scores) ---
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: worldmonitor-app:dev
    restart: unless-stopped
    # Bound the API container's memory so a runaway request can't take the host with it.
    mem_limit: ${WM_API_MEM_LIMIT:-1g}
    command:
      - uvicorn
      - worldmonitor.api.main:create_app
      - --factory
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # Stores reached by SERVICE HOSTNAME (not localhost) inside the compose network.
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-worldmonitor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-worldmonitor}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-worldmonitor}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_SECURE: "false"
      LANDING_BUCKET: ${LANDING_BUCKET:-landing}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY}
      READINESS_PROBE_TIMEOUT_SECONDS: ${READINESS_PROBE_TIMEOUT_SECONDS:-5}
    volumes:
      # READ-ONLY view of the driver's last-tick heartbeat so /ready can surface a truthful,
      # NON-FATAL driver freshness field (ADR 0059). The api is a READER only (:ro).
      - driver-heartbeat:/var/run/worldmonitor:ro
    ports:
      - "8000:8000"
    healthcheck:
      # /ready is the REAL store-reachability probe (200 all-ok / 503 names the down store).
      # urllib.request.urlopen raises on any non-2xx (e.g. the 503 of a down store) -> unhealthy;
      # a stdlib probe avoids baking curl into the image.
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://localhost:8000/ready", timeout=5)
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --- Ingest driver (the long-running pipeline; ADR 0029) — supervised in compose ---
  driver:
    build:
      context: ..
      dockerfile: Dockerfile
    image: worldmonitor-app:dev
    # restart: unless-stopped covers OOM-kill / crash / reboot (the core B-4 fix); plain Compose
    # does NOT auto-restart on *unhealthy* — the HEALTHCHECK makes a STALL observable (ps ->
    # unhealthy) and is the hook for a future autoheal sidecar / k8s liveness probe (ADR 0051 D1).
    restart: unless-stopped
    # mem_limit bounds an OOM (e.g. the GeoNames stream, H-6) to this container -> exit -> restart;
    # it does NOT fix the stream itself (out of scope, H-6).
    mem_limit: ${WM_DRIVER_MEM_LIMIT:-1g}
    command:
      - python
      - -m
      - worldmonitor.runner.driver
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-worldmonitor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-worldmonitor}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-worldmonitor}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_SECURE: "false"
      LANDING_BUCKET: ${LANDING_BUCKET:-landing}
      # build_driver constructs a ConfigCipher eagerly -> needs a VALID Fernet key.
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY}
      # Last-tick heartbeat file (per-container); read by the --healthcheck below.
      DRIVER_HEARTBEAT_PATH: ${DRIVER_HEARTBEAT_PATH:-/var/run/worldmonitor/driver.heartbeat}
      DRIVER_HEARTBEAT_STALE_SECONDS: ${DRIVER_HEARTBEAT_STALE_SECONDS:-90}
    volumes:
      # Sole WRITER of the shared heartbeat dir (read-write). The api mounts the same named
      # volume read-only to surface driver freshness on /ready (ADR 0059) — one writer / one
      # RO reader / atomic writes / non-fatal, so the ADR 0051 D3 shared-volume concern is moot.
      - driver-heartbeat:/var/run/worldmonitor
    healthcheck:
      # Reads ONLY the heartbeat file (no store connections): exit 0 alive / 1 missing-or-stale.
      # A stalled pipeline goes unhealthy here even while the API's /health still echoes ok.
      test: ["CMD", "python", "-m", "worldmonitor.runner.driver", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  minio-data:
  redis-data:
  zitadel-machinekey:
  # Shared driver last-tick heartbeat: written by `driver` (rw), read by `api` (ro) so /ready
  # can report a NON-FATAL driver-freshness field across containers (ADR 0059).
  driver-heartbeat:
