# WorldMonitor — core development stack (Phase 0).
#
#   cp .env.example .env   # fill in values first
#   docker compose -f deploy/compose.yaml up -d
#
# Core services have no profile, so a bare `up` starts them (and
# `--profile core` is equivalent). Future optional services get named profiles.
#
# Images are pinned; bump deliberately. Verify newer tags before changing.

name: worldmonitor

services:
  # --- PostgreSQL 16 + pgvector (app metadata + Zitadel store) ---
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-worldmonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-worldmonitor}
      ZITADEL_DB: ${ZITADEL_DB:-zitadel}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-worldmonitor}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Neo4j 2026.x + Graph Data Science (system of record) ---
  neo4j:
    # Pinned tag (do NOT float): this exact neo4j:2026.05.0-community + GDS auto-download
    # pair is CI-proven — tests/integration/test_graph_gds.py runs green against it and
    # tests/conftest.py uses the same tag. The GDS jar is keyed to the EXACT server
    # version, so bumping the tag without re-validating GDS can break the boot.
    image: neo4j:2026.05.0-community
    restart: unless-stopped
    # Cap container memory so the JVM stays inside the cgroup. Keep this ABOVE
    # heap_max + pagecache + ~1g JVM/OS overhead (2g + 512m + ~1g = 3.5g < 4g default).
    mem_limit: ${NEO4J_MEM_LIMIT:-4g}
    environment:
      # The neo4j SERVER gets its initial password from NEO4J_AUTH ONLY. Do NOT also set a
      # bare NEO4J_PASSWORD: the image maps every NEO4J_<x> env var to a neo4j.conf setting,
      # so NEO4J_PASSWORD becomes an invalid 'password' key that Neo4j 2026 strict config
      # validation rejects -> the container crash-loops and never binds 7687. (The app
      # CLIENT still reads NEO4J_PASSWORD from .env; only the SERVICE must not inherit it.)
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*"
      NEO4J_dbms_security_procedures_allowlist: "gds.*"
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512m}
      # BOUND the JVM heap. Without this Neo4j auto-sizes max heap from visible RAM
      # (~25%); under WSL2 (which reports a large fraction of host RAM) that over-commits
      # and the kernel OOM-killer reaps the server before it binds 7687 — which presents
      # exactly as "connection refused on 7687". Laptop-safe defaults; bump via env on a
      # big host (see .env.example). NOTE the DOUBLED underscore: Neo4j escapes a literal
      # "_" in a setting name as "__" (server.memory.heap.max_size -> ..._heap_max__size).
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-1g}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-2g}
    ports:
      - "7474:7474" # HTTP / Browser
      - "127.0.0.1:7687:7687" # Bolt
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      # Password interpolated by compose at parse time (the server no longer carries a
      # NEO4J_PASSWORD env var); it matches the NEO4J_AUTH password above.
      test:
        ["CMD-SHELL", "cypher-shell -u neo4j -p \"${NEO4J_PASSWORD}\" 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 40s

  # --- MinIO (S3-compatible landing zone) ---
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-worldmonitor}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "127.0.0.1:9000:9000" # S3 API
      - "9001:9001" # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # --- Redis (cache / queues) ---
  redis:
    image: redis:7.4
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  # --- Zitadel (auth / tenancy, OIDC) ---
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.15.2
    restart: unless-stopped
    command: >
      start-from-init
      --masterkey ${ZITADEL_MASTERKEY:?set a 32-char ZITADEL_MASTERKEY in .env}
      --tlsMode disabled
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNALDOMAIN:-localhost}
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNALPORT:-8080}
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
      # Database connection (admin role runs migrations; user role serves runtime)
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${ZITADEL_DB:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${POSTGRES_USER:-worldmonitor}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${POSTGRES_USER:-worldmonitor}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # First instance: org (= first tenant) + admin human user
      ZITADEL_FIRSTINSTANCE_ORG_NAME: ${ZITADEL_ORG_NAME:-WorldMonitor}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_USERNAME:-admin}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:?set ZITADEL_ADMIN_PASSWORD in .env}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: ${ZITADEL_ADMIN_EMAIL:-admin@worldmonitor.localhost}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: "true"
      # Machine user + PAT for automated OIDC-app provisioning (see scripts/dev/zitadel_provision.sh)
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: ${ZITADEL_SA_USERNAME:-provisioner}
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: ${ZITADEL_SA_USERNAME:-provisioner}
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: /machinekey/pat.txt
    ports:
      - "8080:8080"
    volumes:
      - zitadel-machinekey:/machinekey
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready", "--config", "/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # --- One-shot schema migration (Gate B-4c; ADR 0030 production schema path) ---
  # The driver's startup recover_stale() queries task_run/connector_instance, so the app schema
  # must exist before api/driver boot. Runs `alembic upgrade head` (via migrate_to_head) once
  # after Postgres is healthy, then exits — the conventional deploy migration step.
  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
      # Pin the SLIM runtime stage: the Dockerfile's LAST stage is `sandbox-runner` (carries the
      # nmap/dig/whois binaries), so a no-`target` build would default to it — keep the app/init
      # images tool-free (ADR 0077; tools live ONLY in the isolated sandbox-runner service).
      target: runtime
    image: worldmonitor-app:dev
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - python
      - -m
      - worldmonitor.db.migrate
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-worldmonitor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-worldmonitor}

  # --- One-shot curated-connector seed (ADR 0115) ---
  # Populates connector_instance with a curated starter set (news feeds across categories + a
  # bounded OpenSanctions dataset; Bluesky seeded disabled) so a fresh stack ingests REAL data
  # immediately instead of sitting on an empty graph. Idempotent (deterministic ids) — safe to
  # re-run on every `up`; an already-present row is skipped so operator edits survive. Not named
  # in the compose-boot CI job, so it only runs on a full `docker compose up`; the driver picks up
  # the seeded instances on its next tick.
  seed:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
    image: worldmonitor-app:dev
    restart: "no"
    depends_on:
      migrate:
        condition: service_completed_successfully
    command:
      - python
      - -m
      - worldmonitor.db.seed
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-worldmonitor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-worldmonitor}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY}

  # --- One-shot landing-bucket bootstrap (Gate B-4c) ---
  # The API's /ready probe does a read-only head_bucket on the landing bucket; on a fresh stack
  # that bucket does not exist yet (it was previously created lazily by the first ingest), so
  # /ready would be 503 forever and `api` could never reach healthy. This runs our OWN image's
  # canonical ensure_bucket() once, after MinIO is healthy, then exits — no extra image to pin.
  minio-init:
    build:
      context: ..
      dockerfile: Dockerfile
      # Pin the SLIM runtime stage: the Dockerfile's LAST stage is `sandbox-runner` (carries the
      # nmap/dig/whois binaries), so a no-`target` build would default to it — keep the app/init
      # images tool-free (ADR 0077; tools live ONLY in the isolated sandbox-runner service).
      target: runtime
    image: worldmonitor-app:dev
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    command:
      - python
      - -c
      - "from worldmonitor.storage.landing import LandingStore; LandingStore.from_settings().ensure_bucket()"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-worldmonitor}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_SECURE: "false"
      LANDING_BUCKET: ${LANDING_BUCKET:-landing}

  # --- WorldMonitor API (FastAPI; the only read surface onto the graph/scores) ---
  api:
    build:
      context: ..
      dockerfile: Dockerfile
      # Pin the SLIM runtime stage: the Dockerfile's LAST stage is `sandbox-runner` (carries the
      # nmap/dig/whois binaries), so a no-`target` build would default to it — keep the app/init
      # images tool-free (ADR 0077; tools live ONLY in the isolated sandbox-runner service).
      target: runtime
    image: worldmonitor-app:dev
    restart: unless-stopped
    # Bound the API container's memory so a runaway request can't take the host with it.
    mem_limit: ${WM_API_MEM_LIMIT:-1g}
    command:
      - uvicorn
      - worldmonitor.api.main:create_app
      - --factory
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # Stores reached by SERVICE HOSTNAME (not localhost) inside the compose network.
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-worldmonitor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-worldmonitor}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-worldmonitor}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_SECURE: "false"
      LANDING_BUCKET: ${LANDING_BUCKET:-landing}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY}
      READINESS_PROBE_TIMEOUT_SECONDS: ${READINESS_PROBE_TIMEOUT_SECONDS:-5}
      # Heavy ACTIVE CLI tools (e.g. nmap) are delegated to the in-network sandbox-runner sidecar
      # (ADR 0077). Reached by SERVICE HOSTNAME on the shared `sandbox_net` (in-network only).
      # CONTAINER_SANDBOX_ENABLED stays DEFAULT-OFF — the operator opts in once the sidecar is up.
      SANDBOX_RUNNER_URL: http://sandbox-runner:9101
      SANDBOX_RUNNER_SECRET: ${SANDBOX_RUNNER_SECRET}
      # Zitadel auth wiring for the /v1 bearer gate (Phase-3 S3b, ADR 0093). Optional for core boot
      # (empty default: auth unconfigured, ZitadelTokenVerifier is not constructed — JWKS fetch is
      # lazy, never triggered at app-construction or /ready). Set in the host .env alongside
      # WM_LLM_TOKEN when running --profile agent so Hermes' /v1 bearer calls are verified.
      ZITADEL_DOMAIN: ${ZITADEL_DOMAIN:-}
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID:-}
      # LLM gateway → Ollama on the WINDOWS host (LOCAL mode), for the dashboard AI-brief endpoint
      # (ADR 0115, Slice E). Same target as the driver; requires OLLAMA_HOST=0.0.0.0:11434 on Windows.
      LLM_MODE: ${LLM_MODE:-local}
      LLM_OLLAMA_BASE_URL: ${LLM_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LLM_OLLAMA_MODEL: ${LLM_OLLAMA_MODEL:-llama3.2}
    # host.docker.internal → the Docker host (the Windows machine running Ollama).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # On BOTH networks: `default` for store reachability, `sandbox_net` to POST to the sidecar.
    # (Declaring `networks:` removes the implicit `default`, so it MUST be listed explicitly.)
    networks:
      - default
      - sandbox_net
    volumes:
      # READ-ONLY view of the driver's last-tick heartbeat so /ready can surface a truthful,
      # NON-FATAL driver freshness field (ADR 0059). The api is a READER only (:ro).
      - driver-heartbeat:/var/run/worldmonitor:ro
    ports:
      - "8000:8000"
    healthcheck:
      # /ready is the REAL store-reachability probe (200 all-ok / 503 names the down store).
      # urllib.request.urlopen raises on any non-2xx (e.g. the 503 of a down store) -> unhealthy;
      # a stdlib probe avoids baking curl into the image.
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://localhost:8000/ready", timeout=5)
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --- Ingest driver (the long-running pipeline; ADR 0029) — supervised in compose ---
  driver:
    build:
      context: ..
      dockerfile: Dockerfile
      # Pin the SLIM runtime stage: the Dockerfile's LAST stage is `sandbox-runner` (carries the
      # nmap/dig/whois binaries), so a no-`target` build would default to it — keep the app/init
      # images tool-free (ADR 0077; tools live ONLY in the isolated sandbox-runner service).
      target: runtime
    image: worldmonitor-app:dev
    # restart: unless-stopped covers OOM-kill / crash / reboot (the core B-4 fix); plain Compose
    # does NOT auto-restart on *unhealthy* — the HEALTHCHECK makes a STALL observable (ps ->
    # unhealthy) and is the hook for a future autoheal sidecar / k8s liveness probe (ADR 0051 D1).
    restart: unless-stopped
    # mem_limit bounds an OOM (e.g. the GeoNames stream, H-6) to this container -> exit -> restart;
    # it does NOT fix the stream itself (out of scope, H-6).
    mem_limit: ${WM_DRIVER_MEM_LIMIT:-1g}
    command:
      - python
      - -m
      - worldmonitor.runner.driver
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-worldmonitor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-worldmonitor}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-worldmonitor}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_SECURE: "false"
      LANDING_BUCKET: ${LANDING_BUCKET:-landing}
      # build_driver constructs a ConfigCipher eagerly -> needs a VALID Fernet key.
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY}
      # Last-tick heartbeat file (per-container); read by the --healthcheck below.
      DRIVER_HEARTBEAT_PATH: ${DRIVER_HEARTBEAT_PATH:-/var/run/worldmonitor/driver.heartbeat}
      DRIVER_HEARTBEAT_STALE_SECONDS: ${DRIVER_HEARTBEAT_STALE_SECONDS:-90}
      # Prometheus /metrics exporter (Gate H-8c / ADR 0076): bound 0.0.0.0:9108 INSIDE the container,
      # in-network only by default (no host publish below) — a scraper on the compose network hits
      # driver:9108. 0 disables it. The Prometheus server + alert rules stay external/ops (ADR 0054).
      DRIVER_METRICS_PORT: ${DRIVER_METRICS_PORT:-9108}
      # Sandbox-runner sidecar wiring (ADR 0077) — symmetric with the api. The cadence driver still
      # REFUSES all ACTIVE connectors (ADR 0071); this wiring is only used by the operator-run path.
      SANDBOX_RUNNER_URL: http://sandbox-runner:9101
      SANDBOX_RUNNER_SECRET: ${SANDBOX_RUNNER_SECRET}
      # News→event LLM extraction (ADR 0115, Slice B) — DEFAULT OFF. Flip EXTRACTION_ENABLED=true
      # once Ollama is reachable (below) to derive Event/actor nodes from curated-feed articles.
      EXTRACTION_ENABLED: ${EXTRACTION_ENABLED:-false}
      EXTRACTION_CADENCE_SECONDS: ${EXTRACTION_CADENCE_SECONDS:-900}
      EXTRACTION_MAX_ARTICLES_PER_CYCLE: ${EXTRACTION_MAX_ARTICLES_PER_CYCLE:-20}
      # LLM gateway → Ollama on the WINDOWS host (LOCAL mode). `localhost` inside a container is the
      # container itself, so target host.docker.internal. Requires OLLAMA_HOST=0.0.0.0:11434 on
      # Windows + a firewall allow for TCP 11434, and the model pulled (`ollama pull llama3.2`).
      LLM_MODE: ${LLM_MODE:-local}
      LLM_OLLAMA_BASE_URL: ${LLM_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LLM_OLLAMA_MODEL: ${LLM_OLLAMA_MODEL:-llama3.2}
    # host.docker.internal → the Docker host (the Windows machine running Ollama). Declaring it is
    # the portable form (Docker Desktop/WSL2 provides it, but this makes the dependency explicit).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # On BOTH networks: `default` for store reachability, `sandbox_net` to reach the sidecar.
    networks:
      - default
      - sandbox_net
    # Uncomment to expose /metrics on the host (e.g. for a local Prometheus / curl) — loopback-only:
    # ports:
    #   - "127.0.0.1:9108:9108"
    volumes:
      # Sole WRITER of the shared heartbeat dir (read-write). The api mounts the same named
      # volume read-only to surface driver freshness on /ready (ADR 0059) — one writer / one
      # RO reader / atomic writes / non-fatal, so the ADR 0051 D3 shared-volume concern is moot.
      - driver-heartbeat:/var/run/worldmonitor
    healthcheck:
      # Reads ONLY the heartbeat file (no store connections): exit 0 alive / 1 missing-or-stale.
      # A stalled pipeline goes unhealthy here even while the API's /health still echoes ok.
      test: ["CMD", "python", "-m", "worldmonitor.runner.driver", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # --- Sandbox-runner sidecar (ADR 0077) — constrained execution of heavy ACTIVE CLI tools ---
  # The ONLY service carrying the nmap/dnsutils/whois binaries (its dedicated Dockerfile stage), and
  # the ONLY one off the stores' `default` network: it sits on `sandbox_net` ALONE, so by topology it
  # CANNOT reach postgres/neo4j/minio/redis/zitadel — the data-sovereignty / constrained-egress goal
  # (ADR 0077 §D4 refinement: Docker network isolation, no nftables/CAP_NET_ADMIN in v1). Non-root,
  # read-only rootfs + a tmpfs for scratch, bounded mem/pids/cpus/ulimits, and NO host port (the app
  # reaches it in-network at http://sandbox-runner:9101). The cadence driver never auto-runs ACTIVE
  # connectors (ADR 0071); this is operator-run-only, and CONTAINER_SANDBOX_ENABLED stays default-off.
  sandbox-runner:
    build:
      context: ..
      dockerfile: Dockerfile
      target: sandbox-runner
    image: worldmonitor-sandbox:dev
    restart: unless-stopped
    networks:
      - sandbox_net
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: ${WM_SANDBOX_MEM_LIMIT:-512m}
    pids_limit: 256
    cpus: ${WM_SANDBOX_CPUS:-1.0}
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
    cap_drop:
      - ALL
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SANDBOX_RUNNER_SECRET: ${SANDBOX_RUNNER_SECRET}
    healthcheck:
      # In-network liveness probe of GET /health — stdlib urllib (the image has no curl).
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen("http://localhost:9101/health",timeout=3).status==200 else 1)
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  # --- Opt-in reference Prometheus service (ADR 0078 D4) — default-off ---
  # Boot with: docker compose -f deploy/compose.yaml --profile monitoring up -d prometheus
  #
  # Sits on `default` (to scrape driver:9108) and NOT on `sandbox_net` (ADR 0077 egress isolation).
  # Publishes loopback-only host port 127.0.0.1:9090:9090.
  # NOT a depends_on of any core service — a bare `docker compose up` does NOT start it.
  #
  # Image tag: prom/prometheus:v3.0.0 (released Nov 2024, first stable v3.x GA).
  # Verify newer tags at https://hub.docker.com/r/prom/prometheus/tags before bumping.
  prometheus:
    image: prom/prometheus:v3.0.0
    profiles:
      - monitoring
    restart: unless-stopped
    networks:
      - default
    volumes:
      # Mount the scrape config and alert rules read-only into /etc/prometheus (the default
      # Prometheus config dir). The rule_files entry in prometheus.yml references
      # "alerts/worldmonitor.rules.yml" relative to /etc/prometheus.
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
    ports:
      # Loopback-only: Prometheus is for operator/internal use, not public-facing.
      - "127.0.0.1:9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --output-document=-
        - http://localhost:9090/-/healthy
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Opt-in MCP HTTP read server (Phase-3 S3b, ADR 0093) — default-off ---
  # Boot with: docker compose -f deploy/compose.yaml --profile agent up -d
  #
  # Runs the authenticated streamable-http MCP surface (S1, ADR 0090) — the four read tools
  # (get_entity / get_neighbors / get_provenance / find_paths) bearer-gated by the same
  # ZitadelTokenVerifier the REST API uses. Bearer-fail-closed: main() hard-raises at boot if
  # ZITADEL_DOMAIN is unset. MCP_HTTP_HOST=0.0.0.0 (NOT 127.0.0.1) so hermes can reach the port
  # inside the compose network. No host port (in-network only; hermes → http://mcp:8765/mcp).
  # No healthcheck in S3b (revisit trigger in ADR 0093).
  # NOT a depends_on of any core service — a bare `docker compose up` does NOT start it.
  mcp:
    image: worldmonitor-app:dev
    command: ["python", "-m", "worldmonitor.mcp"]
    profiles:
      - agent
    restart: unless-stopped
    networks:
      - default
    depends_on:
      neo4j:
        condition: service_healthy
      zitadel:
        condition: service_healthy
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: "8765"
      ZITADEL_DOMAIN: ${ZITADEL_DOMAIN:?set ZITADEL_DOMAIN in .env (MCP HTTP bearer auth)}
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID:?set ZITADEL_CLIENT_ID in .env}
      MCP_RESOURCE_SERVER_URL: ${MCP_RESOURCE_SERVER_URL:-}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}

  # --- Opt-in Hermes agent container (Phase-3 S3b, ADR 0093) — default-off ---
  # Boot with: docker compose -f deploy/compose.yaml --profile agent up -d
  #
  # NousResearch hermes-agent v0.17.0 (ADR 0089 D2). Pinned image — operator confirms/pulls or
  # builds from the Nous repo on the host (the WSL dev box cannot build Docker images; see
  # deploy/hermes/README.md §1). Hermes connects to mcp:8765/mcp (bearer-gated S1 read tools)
  # and api:8000/v1 (S3a sovereignty choke point — all model traffic stays inside our egress audit
  # + confidential selector). Config template at ./hermes/config.yaml mounted read-only; secrets
  # (WM_MCP_TOKEN / WM_LLM_TOKEN) resolved from container env at connect time — never committed.
  # NOT a depends_on of any core service — a bare `docker compose up` does NOT start it.
  hermes:
    image: ghcr.io/nousresearch/hermes-agent:v0.17.0
    profiles:
      - agent
    restart: unless-stopped
    networks:
      - default
    depends_on:
      mcp:
        condition: service_started
      api:
        condition: service_healthy
    environment:
      WM_MCP_TOKEN: ${WM_MCP_TOKEN:?set WM_MCP_TOKEN in .env (Hermes MCP bearer)}
      WM_LLM_TOKEN: ${WM_LLM_TOKEN:?set WM_LLM_TOKEN in .env (Hermes /v1 bearer)}
      HERMES_HOME: ${HERMES_HOME:-/etc/hermes}
    volumes:
      - ./hermes/config.yaml:${HERMES_HOME:-/etc/hermes}/config.yaml:ro
    command: ["hermes", "gateway", "run"]

volumes:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  minio-data:
  redis-data:
  zitadel-machinekey:
  # Shared driver last-tick heartbeat: written by `driver` (rw), read by `api` (ro) so /ready
  # can report a NON-FATAL driver-freshness field across containers (ADR 0059).
  driver-heartbeat:

networks:
  # The stores (postgres/neo4j/minio/redis/zitadel) + the app sit on `default`; the sandbox-runner
  # is deliberately OFF it (egress isolation, ADR 0077). Declared explicitly so api/driver can name
  # both networks (declaring `networks:` on a service drops the implicit default membership).
  default: {}
  # The sandbox-runner's ONLY network — api/driver also join it to POST to the sidecar; no store does,
  # so the sidecar cannot reach our internal stores (the data-sovereignty / constrained-egress goal).
  sandbox_net: {}
