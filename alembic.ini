# Alembic config for the `alembic` CLI (dev: generate revisions, manual upgrade).
# The application runs migrations programmatically via
# `worldmonitor.db.engine.migrate_to_head` (ADR 0030); migrations live INSIDE the
# package so they ship with the wheel. The URL is resolved in env.py from settings.
[alembic]
script_location = src/worldmonitor/db/migrations
prepend_sys_path = src
path_separator = os
